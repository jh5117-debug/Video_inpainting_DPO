experiment_name: exp15_or_benchmark_davis50
task: OR / object removal
dataset: DAVIS2017 foreground object masks, DAVIS50 subset
status: preparing
comp_for_metric: false
vbench: false
eval_metric:
  primary:
    - PSNR_bg
    - SSIM_bg_ignore_mask
