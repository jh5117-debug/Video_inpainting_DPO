loss_formula: |
  m_w/m_l/m_w_ref/m_l_ref are region-weighted MSE values.
  win_gap = m_w - m_w_ref
  lose_gap = m_l - m_l_ref
  L_total = -logσ{-0.5 * 10 * (win_gap - 0.25 * lose_gap)} + 0.05 * m_w + ReLU(win_gap)
