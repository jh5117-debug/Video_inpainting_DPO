  - {radius_mode: legacy_latent_exact, radius_value: 0, boundary_contribution: 0.75, aggregation: legacy_global_weighted_mean, description: legacy exact Exp11 parity/control}
  - {radius_mode: fixed_image_px, radius_value: 4, boundary_contribution: 0.5, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 4, boundary_contribution: 1.5, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 8, boundary_contribution: 0.75, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 8, boundary_contribution: 2.0, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 12, boundary_contribution: 1.0, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 12, boundary_contribution: 3.0, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 16, boundary_contribution: 0.5, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 16, boundary_contribution: 2.0, aggregation: legacy_global_weighted_mean}
  - {radius_mode: fixed_image_px, radius_value: 24, boundary_contribution: 1.0, aggregation: legacy_global_weighted_mean}
